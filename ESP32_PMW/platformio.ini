[platformio]
data_dir = spiffs_data ; SPIFFS/filesystem source directory for `buildfs`/`uploadfs`.

; [env:esp32dev]
[env]
platform = espressif32@^6.11.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_flags =
	-D USE_SYNC=0
	-D SYNC_AS_SERVER=1
	-D SYNC_LATENCY_US=15
	-D ARDUINOJSON_ENABLE_COMMENTS=1 ; Allow // and /* */ comments in JSON
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
monitor_filters = esp32_exception_decoder

[env:current_pid]
build_src_filter = +<*> -<main_*.cpp> +<main_current_pid.cpp>

; SerialComm library demo: echoes each incoming line back with a prefix
[env:serialcomm_demo]
build_src_filter = +<*> -<main_*.cpp> +<main_serialcomm_demo.cpp>

; --- JSON-driven per-experiment firmwares (each owns setup()/loop via drive_common.h) ---

; Flight: live PC-commanded takeoff->hover->directional accel, PI-balanced.
; Spin-up ramp is code-built (no JSON), so no uploadfs step is needed.
[env:flight]
build_src_filter = +<*> -<main_*.cpp> +<main_flight.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Tilt: EASE 1->210Hz ramp + 100->0% carrier step-down, PI-balanced.
[env:tilt]
build_src_filter = +<*> -<main_*.cpp> +<main_tilt.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Takeoff: 1->500Hz double ramp at 100% carrier, PI-balanced.
[env:takeoff]
build_src_filter = +<*> -<main_*.cpp> +<main_takeoff.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Upside-down takeoff: CW, 1->190Hz, PI-balanced.
[env:takeoff_upside_down]
build_src_filter = +<*> -<main_*.cpp> +<main_takeoff_upside_down.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Carrier-duty ramp 0->100% at 190Hz, PI-balanced.
[env:carrier_ramp]
build_src_filter = +<*> -<main_*.cpp> +<main_carrier_ramp.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Compensation A/B test (baseline vs per-channel trims), open-loop passthrough.
[env:comp_test]
build_src_filter = +<*> -<main_*.cpp> +<main_comp_test.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Coil-coupling characterization sweep, open-loop passthrough.
[env:coupling_test]
build_src_filter = +<*> -<main_*.cpp> +<main_coupling_test.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; DC calibration (all pins static HIGH), open-loop passthrough.
[env:dc]
build_src_filter = +<*> -<main_*.cpp> +<main_dc.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Ceiling characterization: all channels 100% carrier across a 1->210Hz ramp,
; open-loop passthrough. Feeds Ceiling_i(f) to ai/tilt_metrics.py.
[env:ceiling]
build_src_filter = +<*> -<main_*.cpp> +<main_ceiling.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data
