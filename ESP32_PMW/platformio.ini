; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; [env:esp32dev]
[env]
platform = espressif32@^6.11.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = 
	-D USE_SYNC=0
	-D SYNC_AS_SERVER=1
	-D SYNC_LATENCY_US=15
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
	; https://github.com/ESP32Async/ESPAsyncWebServer.git
    ; https://github.com/ESP32Async/AsyncTCP.git
    ; https://github.com/thelastoutpostworkshop/gpio_viewer.git
monitor_filters = esp32_exception_decoder

; Each env keeps exactly ONE main_*.cpp entry point:
;   +<*> include all, -<main_*.cpp> drop every main, +<the one> add it back.
;   (+<*> still pulls in the non-main sources: constants/current_sense/
;   balanced_experiment etc., and the lib/ libraries via the LDF.)
;
; Every experiment is its own firmware that loads its OWN task sequence from
; SPIFFS (spiffs_data/<name>.json) -- no swappable /experiment.json copy step.
; The shared runner (src/balanced_experiment.cpp) plays the JSON's commutation
; and, for lift experiments, overlays the shared current-balance PI loop
; (lib/CurrentBalanceController) so the four channels stay within ~0.4 A of each
; other beneath whatever carrier ceiling the JSON commands. Characterization
; runs (comp_test/coupling_test/dc) run the same firmware in passthrough
; (piEnabled=false) so they keep their intended per-channel drive.
;
; Upload the JSON payloads once with `pio run -e <env> -t uploadfs` (all live in
; spiffs_data/; each firmware opens its own filename), then the firmware with
; `pio run -e <env> -t upload`.

; Frequency-scheduled PI current-balance controller: the standalone tuning rig
; (serial kp=/ki=/kd=/ramp=/dir=), hardcoded 1->210Hz ramp, no SPIFFS.
[env:current_pid]
build_src_filter = +<*> -<main_*.cpp> +<main_current_pid.cpp>

; SerialComm library demo: echoes each incoming line back with a prefix
[env:serialcomm_demo]
build_src_filter = +<*> -<main_*.cpp> +<main_serialcomm_demo.cpp>

; --- JSON-driven per-experiment firmwares (all use src/balanced_experiment) ---

; Tilt: EASE 1->210Hz ramp + 100->0% carrier step-down, PI-balanced.
[env:tilt]
build_src_filter = +<*> -<main_*.cpp> +<main_tilt.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Takeoff: 1->500Hz double ramp at 100% carrier, PI-balanced.
[env:takeoff]
build_src_filter = +<*> -<main_*.cpp> +<main_takeoff.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Upside-down takeoff: CW, 1->190Hz, PI-balanced.
[env:takeoff_upside_down]
build_src_filter = +<*> -<main_*.cpp> +<main_takeoff_upside_down.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Carrier-duty ramp 0->100% at 190Hz, PI-balanced.
[env:carrier_ramp]
build_src_filter = +<*> -<main_*.cpp> +<main_carrier_ramp.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Compensation A/B test (baseline vs per-channel trims), open-loop passthrough.
[env:comp_test]
build_src_filter = +<*> -<main_*.cpp> +<main_comp_test.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Coil-coupling characterization sweep, open-loop passthrough.
[env:coupling_test]
build_src_filter = +<*> -<main_*.cpp> +<main_coupling_test.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; DC calibration (all pins static HIGH), open-loop passthrough.
[env:dc]
build_src_filter = +<*> -<main_*.cpp> +<main_dc.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data

; Ceiling characterization: all channels 100% carrier across a 1->210Hz ramp,
; open-loop passthrough. Feeds Ceiling_i(f) to tools/tilt_metrics.py.
[env:ceiling]
build_src_filter = +<*> -<main_*.cpp> +<main_ceiling.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data
