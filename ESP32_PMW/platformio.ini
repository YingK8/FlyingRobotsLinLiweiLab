; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; [env:esp32dev]
[env]
platform = espressif32@^6.11.0
board = featheresp32
framework = arduino
monitor_speed = 115200
build_flags = 
	-D USE_SYNC=0
	-D SYNC_AS_SERVER=1
	-D SYNC_LATENCY_US=15
lib_deps = bblanchon/ArduinoJson@^7.2.2
monitor_filters = esp32_exception_decoder

; Environment for tilting experiment
[env:tilt]
; Include everything (+<*>) but exclude the other mains
build_src_filter = +<*> -<main_takeoff.cpp> -<main_servo.cpp> -<main_balance.cpp> -<main_dc.cpp>

; Environment for App B
[env:takeoff]
; Include everything (+<*>) but exclude the other mains
build_src_filter = +<*> -<main_tilt.cpp> -<main_servo.cpp> -<main_balance.cpp> -<main_dc.cpp>

; Environment for closed-loop visual-servoing actuator (host streams F<hz>)
[env:servo]
; Include everything (+<*>) but exclude the characterization mains
build_src_filter = +<*> -<main_tilt.cpp> -<main_takeoff.cpp> -<main_balance.cpp> -<main_dc.cpp>

; Environment for low-level coil current-balance bench test (CoilBalancer)
[env:balance]
; Include everything (+<*>) but exclude the other mains
build_src_filter = +<*> -<main_tilt.cpp> -<main_takeoff.cpp> -<main_servo.cpp> -<main_dc.cpp>

; Environment for steady DC drive / H-bridge current-gain calibration
[env:dc]
; Include everything (+<*>) but exclude the other mains
build_src_filter = +<*> -<main_tilt.cpp> -<main_takeoff.cpp> -<main_servo.cpp> -<main_balance.cpp>