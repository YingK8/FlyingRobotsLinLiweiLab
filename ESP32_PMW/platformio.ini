; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; [env:esp32dev]
[env]
platform = espressif32@^6.11.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = 
	-D USE_SYNC=0
	-D SYNC_AS_SERVER=1
	-D SYNC_LATENCY_US=15
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
	; https://github.com/ESP32Async/ESPAsyncWebServer.git
    ; https://github.com/ESP32Async/AsyncTCP.git
    ; https://github.com/thelastoutpostworkshop/gpio_viewer.git
monitor_filters = esp32_exception_decoder

; Each env keeps exactly ONE main_*.cpp entry point:
;   +<*> include all, -<main_*.cpp> drop every main, +<the one> add it back.
;
; The scripted/open-loop experiment envs that used to live here (tilt,
; takeoff, upside_down, carrier_ramp, test_current, coupling_test, comp_test,
; dc, field_balance) were consolidated into the single JSON-driven
; [env:experiment] below -- see spiffs_data/README.md for where each one's
; behavior now lives (as a JSON payload) and any fidelity notes.

; Frequency-scheduled PI current-balance controller (feedforward + residual
; PID against live CS -> ADC feedback, gated behind a boot-time ADC sanity check)
[env:current_pid]
build_src_filter = +<*> -<main_*.cpp> +<main_current_pid.cpp>

; SerialComm library demo: echoes each incoming line back with a prefix
[env:serialcomm_demo]
build_src_filter = +<*> -<main_*.cpp> +<main_serialcomm_demo.cpp>

; Generic JSON-driven experiment firmware (see lib/JsonPhaseSequencer):
; boots, arms 3s, loads /experiment.json from SPIFFS, runs it autonomously,
; latches coils off when done or on parse failure. Upload the JSON payload
; with `pio run -e experiment -t uploadfs` (source dir: spiffs_data/, NOT
; the top-level data/ dir, which is the captured-results directory).
[env:experiment]
build_src_filter = +<*> -<main_*.cpp> +<main_experiment.cpp>
board_build.filesystem = spiffs
board_build.filesystem_dir = spiffs_data
