; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; [env:esp32dev]
[env]
platform = espressif32@^6.11.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = 
	-D USE_SYNC=0
	-D SYNC_AS_SERVER=1
	-D SYNC_LATENCY_US=15
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
	; https://github.com/ESP32Async/ESPAsyncWebServer.git
    ; https://github.com/ESP32Async/AsyncTCP.git
    ; https://github.com/thelastoutpostworkshop/gpio_viewer.git
monitor_filters = esp32_exception_decoder

; OUTDATED, use tilt1+tilt2. Environment for tilting experiment
[env:tilt]
; Include everything (+<*>) but keep only main_tilt.cpp as the entry point
build_src_filter = +<*> -<main_takeoff.cpp> -<main_takeoff_upside_down.cpp> -<main_carrier_ramp.cpp>

; Environment for upright takeoff
[env:takeoff]
; Include everything (+<*>) but keep only main_takeoff.cpp as the entry point
build_src_filter = +<*> -<main_tilt.cpp> -<main_takeoff_upside_down.cpp> -<main_carrier_ramp.cpp>

; Environment for upside-down takeoff
[env:upside_down]
; Include everything (+<*>) but keep only main_takeoff_upside_down.cpp as the entry point
build_src_filter = +<*> -<main_tilt.cpp> -<main_takeoff.cpp> -<main_carrier_ramp.cpp>

; Environment for carrier duty cycle ramp experiment
[env:carrier_ramp]
; Include everything (+<*>) but keep only main_carrier_ramp.cpp as the entry point
build_src_filter = +<*> -<main_tilt.cpp> -<main_takeoff.cpp> -<main_takeoff_upside_down.cpp>
