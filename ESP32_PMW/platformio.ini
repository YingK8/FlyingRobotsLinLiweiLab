; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
data_dir = task_sequences

; NOT [env] -- a plain [env] section is auto-inherited by EVERY [env:xxx]
; section including [env:native_pid] below, which must NOT get an ESP32
; board/framework. Using a named extra-section + explicit `extends` (only
; the ESP32 envs opt in) avoids that.
[esp32_env]
platform = espressif32@^6.11.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
	-D USE_SYNC=0
	-D SYNC_AS_SERVER=1
	-D SYNC_LATENCY_US=15
lib_deps =
	bblanchon/ArduinoJson@^7.2.2
monitor_filters = esp32_exception_decoder

[env:current_pid]
extends = esp32_env
build_src_filter = +<*> -<main_*.cpp> +<main_current_pid.cpp>
lib_deps =
	${esp32_env.lib_deps}
	br3ttb/PID-AutoTune@^1.0.0

[env:serialcomm_demo]
extends = esp32_env
build_src_filter = +<*> -<main_*.cpp> +<main_serialcomm_demo.cpp>

[env:experiment]
extends = esp32_env
build_src_filter = +<*> -<main_*.cpp> +<main_experiment.cpp>
board_build.filesystem = spiffs
lib_deps =
	${esp32_env.lib_deps}
	br3ttb/PID-AutoTune@^1.0.0

[env:pid_profile]
extends = esp32_env
build_src_filter = +<*> -<main_*.cpp> +<main_pid_profile.cpp>
board_build.filesystem = spiffs

; Host-native build for RatioCurrentController's offline test suite -- no
; ESP32/coils involved, does NOT extend esp32_env. src/ is entirely
; ESP32-only (Arduino main.cpp-style sketches) and excluded here;
; RatioCurrentController lives in lib/ (like every other reusable
; component in this project) specifically so PlatformIO's LDF links it
; into both firmware AND this native test build automatically -- it
; deliberately avoids constants.h/Arduino/ESP-IDF includes, see
; lib/RatioCurrentController/src/RatioCurrentController.h.
[env:native_pid]
platform = native
build_src_filter = -<*>
test_filter = test_ratio_controller
