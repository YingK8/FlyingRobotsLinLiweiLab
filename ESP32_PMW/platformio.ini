; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; [env:esp32dev]
[env]
platform = espressif32@^6.11.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = 
	-D USE_SYNC=0
	-D SYNC_AS_SERVER=1
	-D SYNC_LATENCY_US=15
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
	; https://github.com/ESP32Async/ESPAsyncWebServer.git
    ; https://github.com/ESP32Async/AsyncTCP.git
    ; https://github.com/thelastoutpostworkshop/gpio_viewer.git
monitor_filters = esp32_exception_decoder

; Each env keeps exactly ONE main_*.cpp entry point:
;   +<*> include all, -<main_*.cpp> drop every main, +<the one> add it back.

; OUTDATED, use tilt1+tilt2. Environment for tilting experiment
[env:tilt]
build_src_filter = +<*> -<main_*.cpp> +<main_tilt.cpp>

; Environment for upright takeoff
[env:takeoff]
build_src_filter = +<*> -<main_*.cpp> +<main_takeoff.cpp>

; Environment for upside-down takeoff
[env:upside_down]
build_src_filter = +<*> -<main_*.cpp> +<main_takeoff_upside_down.cpp>

; Environment for carrier duty cycle ramp experiment
[env:carrier_ramp]
build_src_filter = +<*> -<main_*.cpp> +<main_carrier_ramp.cpp>

[env:test_current]
build_src_filter = +<*> -<main_*.cpp> +<main_test_current.cpp>

; Coupling / drive-imbalance test (serial-selectable channels, constant 190 Hz)
[env:coupling_test]
build_src_filter = +<*> -<main_*.cpp> +<main_coupling_test.cpp>

; Current-balance feedback controller (balanced rotating field; CS -> ADC)
[env:field_balance]
build_src_filter = +<*> -<main_*.cpp> +<main_field_balance.cpp>

; Straight DC drive (all PWM + carrier pins HIGH) for DC CS calibration
[env:dc]
build_src_filter = +<*> -<main_*.cpp> +<main_DC.cpp>
