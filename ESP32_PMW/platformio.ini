[env:esp32dev]
; [env:lolin32_lite]
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
platform = espressif32

; board = lolin32_lite
; board =  adafruit_feather_esp32_v2
board = esp32dev
framework = arduino 

monitor_speed = 115200

build_flags = 
    -D USE_SYNC=0      ; Enable/Disable sync globally
    -D SYNC_AS_SERVER=1 ; 1 for Server, 0 for Client
    -D SYNC_LATENCY_US=15 ; Sync latency in microseconds (adjust as needed)